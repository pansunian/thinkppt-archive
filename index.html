<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ThinkPPT | 深刻 PPT</title>
    
    <!-- 正文字体 Preload -->
    <link rel="preload" href="/XiXianTingMingTi.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    
    <!-- 
      DEBUG: 暂时移除 jinghualaosongti 的 preload，
      因为我们将统一使用 XiXianTingMingTi.woff2 进行测试 
    -->
    <!-- <link rel="preload" href="/jinghualaosongti.woff?v=20250226" as="font" crossorigin="anonymous"> -->

    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ['ThinkPPT-Text', 'sans-serif'],
                mono: ['ThinkPPT-Text', 'monospace'],
                heading: ['ThinkPPT-Title', 'serif'], 
              }
            }
          }
        }
      }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      /* 
         ThinkPPT-Title (Heading) 
         DEBUG MODE: 临时将标题字体的源文件指向 '/XiXianTingMingTi.woff2'。
         如果这能显示，说明代码逻辑没问题，是之前的 .woff 文件本身或路径有问题。
      */
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('/XiXianTingMingTi.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('/XiXianTingMingTi.woff2') format('woff2');
        font-weight: 700; /* Bold */
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('/XiXianTingMingTi.woff2') format('woff2');
        font-weight: 900; /* Black */
        font-style: normal;
        font-display: swap;
      }

      /* ThinkPPT-Text (Body) */
      @font-face {
        font-family: 'ThinkPPT-Text';
        src: url('/XiXianTingMingTi.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'ThinkPPT-Text';
        src: url('/XiXianTingMingTi.woff2') format('woff2');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      body {
        font-family: 'ThinkPPT-Text', sans-serif;
        background-color: #d1cbc2;
        -webkit-font-smoothing: antialiased;
      }

      .paper-texture {
        position: relative;
      }
      .paper-texture::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.4;
        pointer-events: none;
        background-image: url("https://www.transparenttextures.com/patterns/p6-polyester.png");
        mix-blend-mode: multiply;
      }

      .ink-stamp {
        filter: url(#ink-bleed);
      }
      
      .font-mono {
        font-family: 'ThinkPPT-Text', monospace !important;
      }
    </style>

    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
      <filter id="paper-grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" />
        <feColorMatrix type="saturate" values="0" />
        <feBlend mode="multiply" in2="SourceGraphic" />
      </filter>
      <filter id="ink-bleed">
        <feGaussianBlur in="SourceGraphic" stdDeviation="0.4" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
    </svg>

  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "vite": "https://esm.sh/vite@^7.2.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
