<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Removed theme-color to allow transparent/glass effect in Safari -->
    <title>ThinkPPT | 深刻 PPT</title>
    
    <!-- 0. PRELOAD FONTS: Force browser to download these immediately -->
    <link rel="preload" href="https://assets-v2.super.so/sites/fa483943-cb44-46ec-986d-dcbbcf1398b0/fonts/8c277b02-1fee-42f2-afdb-02cecbd48cff.woff" as="font" type="font/woff" crossorigin="anonymous">
    <link rel="preload" href="https://assets-v2.super.so/sites/fa483943-cb44-46ec-986d-dcbbcf1398b0/fonts/5afcb017-146a-44e9-a7a2-da1475e69f59.woff2" as="font" type="font/woff2" crossorigin="anonymous">

    <!-- 1. Configure Tailwind BEFORE loading the library -->
    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ['ThinkPPT-Text', 'sans-serif'],
                mono: ['ThinkPPT-Text', 'monospace'],
                heading: ['ThinkPPT-Title', 'sans-serif'],
              }
            }
          }
        }
      }
    </script>
    
    <!-- 2. Load Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      /* --- FONT DEFINITIONS --- */
      /* Note: We map the SAME file to both 400 (Normal) and 700 (Bold) 
         to ensure Desktop browsers use it even when 'font-bold' is applied. */

      /* 1. Title Font - Normal */
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('https://assets-v2.super.so/sites/fa483943-cb44-46ec-986d-dcbbcf1398b0/fonts/8c277b02-1fee-42f2-afdb-02cecbd48cff.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      /* 1. Title Font - Force Bold Mapping */
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('https://assets-v2.super.so/sites/fa483943-cb44-46ec-986d-dcbbcf1398b0/fonts/8c277b02-1fee-42f2-afdb-02cecbd48cff.woff') format('woff');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      /* 2. Text Font - Normal */
      @font-face {
        font-family: 'ThinkPPT-Text';
        src: url('https://assets-v2.super.so/sites/fa483943-cb44-46ec-986d-dcbbcf1398b0/fonts/5afcb017-146a-44e9-a7a2-da1475e69f59.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      /* 2. Text Font - Force Bold Mapping */
      @font-face {
        font-family: 'ThinkPPT-Text';
        src: url('https://assets-v2.super.so/sites/fa483943-cb44-46ec-986d-dcbbcf1398b0/fonts/5afcb017-146a-44e9-a7a2-da1475e69f59.woff2') format('woff2');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      html {
        background-color: #ffffff; /* Ensure Root is white for Safari Transparency */
      }

      body {
        /* Apply the "Small Font" (Text font) globally */
        font-family: 'ThinkPPT-Text', sans-serif;
        /* Default white background to support transparency in Safari if needed */
        background-color: #ffffff;
        -webkit-font-smoothing: antialiased; /* Make fonts look thinner/cleaner on Mac */
        -moz-osx-font-smoothing: grayscale;
      }

      /* On Desktop, revert body background to Desk Color (#e8e4da) just in case */
      @media (min-width: 768px) {
        body {
            background-color: #e8e4da;
        }
      }

      /* Apply the "Title Font" to all Headings globally as a fallback */
      h1, h2, h3, h4, h5, h6 {
        font-family: 'ThinkPPT-Title', sans-serif;
      }
      
      /* Override .font-mono to use the "Small Font" instead of system monospace */
      .font-mono {
        font-family: 'ThinkPPT-Text', monospace !important;
        letter-spacing: 0.05em; /* Add slight tracking for a cleaner "small text" look */
      }

      /* Custom Scrollbar for the Archive feel */
      ::-webkit-scrollbar {
        width: 12px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-left: 2px solid black;
      }
      ::-webkit-scrollbar-thumb {
        background: #000;
        border: 2px solid #f1f1f1;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #333;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "vite": "https://esm.sh/vite@^7.2.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    
    <!-- Debug Script for CORS: Check console if fonts fail -->
    <script>
      document.fonts.ready.then(function () {
        console.log('Fonts loaded state:', document.fonts.status);
        const fontCheck = new FontFace('CheckTest', 'url(https://assets-v2.super.so/sites/fa483943-cb44-46ec-986d-dcbbcf1398b0/fonts/8c277b02-1fee-42f2-afdb-02cecbd48cff.woff)');
        fontCheck.load().catch(e => {
            console.error('Font Load Error (Likely CORS):', e);
            console.log('%c Please enable CORS in Aliyun OSS Console!', 'background: red; color: white; font-size: 16px; padding: 4px;');
        });
      });
    </script>
  </body>
</html>
