
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ThinkPPT | 深刻 PPT</title>
    
    <link rel="preload" href="/jinghualaosongti.woff" as="font" type="font/woff" crossorigin="anonymous">
    <link rel="preload" href="/XiXianTingMingTi.woff2" as="font" type="font/woff2" crossorigin="anonymous">

    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ['ThinkPPT-Text', 'sans-serif'],
                mono: ['ThinkPPT-Text', 'monospace'],
                heading: ['ThinkPPT-Title', 'serif'], 
              }
            }
          }
        }
      }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      /* 定义标题字体：jinghualaosongti */
      /* 强制映射同一个文件到不同的字重，确保 font-bold 和 font-black 生效 */
      
      /* Regular (400) */
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('/jinghualaosongti.woff?v=2') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      /* Bold (700) - 对应 Tailwind font-bold */
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('/jinghualaosongti.woff?v=2') format('woff');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      /* Black (900) - 对应 Tailwind font-black */
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('/jinghualaosongti.woff?v=2') format('woff');
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }

      /* 定义正文字体：XiXianTingMingTi */
      @font-face {
        font-family: 'ThinkPPT-Text';
        src: url('/XiXianTingMingTi.woff2?v=2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      /* 同样为正文映射粗体，防止正文加粗时丢失字体 */
      @font-face {
        font-family: 'ThinkPPT-Text';
        src: url('/XiXianTingMingTi.woff2?v=2') format('woff2');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      body {
        font-family: 'ThinkPPT-Text', sans-serif;
        background-color: #d1cbc2; /* 模拟实木桌面或深色背景 */
        -webkit-font-smoothing: antialiased;
      }

      /* 纸张纹理叠加层 */
      .paper-texture {
        position: relative;
      }
      .paper-texture::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.4;
        pointer-events: none;
        background-image: url("https://www.transparenttextures.com/patterns/p6-polyester.png");
        mix-blend-mode: multiply;
      }

      /* 油墨压印滤镜 */
      .ink-stamp {
        filter: url(#ink-bleed);
      }

      .font-mono {
        font-family: 'ThinkPPT-Text', monospace !important;
      }
    </style>

    <!-- SVG 纹理生成器 -->
    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
      <filter id="paper-grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" />
        <feColorMatrix type="saturate" values="0" />
        <feBlend mode="multiply" in2="SourceGraphic" />
      </filter>
      <filter id="ink-bleed">
        <feGaussianBlur in="SourceGraphic" stdDeviation="0.4" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
    </svg>

  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "vite": "https://esm.sh/vite@^7.2.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
