<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ThinkPPT | 深刻 PPT</title>
    
    <link rel="preload" href="/FZGaoYMCTJW-R.woff" as="font" type="font/woff" crossorigin="anonymous">
    <link rel="preload" href="/SourceHanSansCN-Light.woff" as="font" type="font/woff" crossorigin="anonymous">

    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ['ThinkPPT-Text', 'sans-serif'],
                mono: ['ThinkPPT-Text', 'monospace'],
                heading: ['ThinkPPT-Title', 'sans-serif'],
              }
            }
          }
        }
      }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('/FZGaoYMCTJW-R.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'ThinkPPT-Text';
        src: url('/SourceHanSansCN-Light.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      body {
        font-family: 'ThinkPPT-Text', sans-serif;
        background-color: #ffffff; /* 移动端改为白色，与内容区一致 */
        -webkit-font-smoothing: antialiased;
      }

      @media (min-width: 1024px) {
        body {
          background-color: #d1cbc2; /* 桌面端保持深色桌面感 */
        }
      }

      /* 纸张纹理叠加层 */
      .paper-texture {
        position: relative;
      }
      .paper-texture::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.4;
        pointer-events: none;
        background-image: url("https://www.transparenttextures.com/patterns/p6-polyester.png");
        mix-blend-mode: multiply;
      }

      /* 油墨压印滤镜 */
      .ink-stamp {
        filter: url(#ink-bleed);
      }

      .font-mono {
        font-family: 'ThinkPPT-Text', monospace !important;
      }
      
      /* 强制 3D 渲染，解决部分移动端 Z-Index 抖动问题 */
      .perspective-1000 {
        perspective: 1000px;
        transform-style: preserve-3d;
      }
    </style>

    <!-- SVG 纹理生成器 -->
    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
      <filter id="paper-grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" />
        <feColorMatrix type="saturate" values="0" />
        <feBlend mode="multiply" in2="SourceGraphic" />
      </filter>
      <filter id="ink-bleed">
        <feGaussianBlur in="SourceGraphic" stdDeviation="0.4" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
    </svg>

  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "vite": "https://esm.sh/vite@^7.2.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
