<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Removed theme-color to allow transparent/glass effect in Safari -->
    <title>ThinkPPT | 深刻 PPT</title>
    
    <!-- 0. PRELOAD FONTS: Force browser to download these immediately -->
    <!-- Title Font: FZGaoYMCTJW-R.woff -->
    <link rel="preload" href="/FZGaoYMCTJW-R.woff" as="font" type="font/woff" crossorigin="anonymous">
    <!-- Body/Text Font: SourceHanSansCN-ExtraLight.woff -->
    <link rel="preload" href="/SourceHanSansCN-ExtraLight.woff" as="font" type="font/woff" crossorigin="anonymous">

    <!-- 1. Configure Tailwind BEFORE loading the library -->
    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ['ThinkPPT-Text', 'sans-serif'],
                mono: ['ThinkPPT-Text', 'monospace'],
                heading: ['ThinkPPT-Title', 'sans-serif'],
              }
            }
          }
        }
      }
    </script>
    
    <!-- 2. Load Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      /* --- FONT DEFINITIONS --- */
      
      /* 1. Title Font - Uses FZGaoYMCTJW-R.woff */
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('/FZGaoYMCTJW-R.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      /* Force Bold mapping for Title to same file */
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('/FZGaoYMCTJW-R.woff') format('woff');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      /* 2. Text Font - Uses SourceHanSansCN-ExtraLight.woff */
      @font-face {
        font-family: 'ThinkPPT-Text';
        src: url('/SourceHanSansCN-ExtraLight.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      /* Force Bold mapping for Text to same file */
      @font-face {
        font-family: 'ThinkPPT-Text';
        src: url('/SourceHanSansCN-ExtraLight.woff') format('woff');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      html {
        background-color: #ffffff; /* Ensure Root is white for Safari Transparency */
      }

      body {
        /* Apply the "Small Font" (Text font) globally */
        font-family: 'ThinkPPT-Text', sans-serif;
        /* Default white background to support transparency in Safari if needed */
        background-color: #ffffff;
        -webkit-font-smoothing: antialiased; /* Make fonts look thinner/cleaner on Mac */
        -moz-osx-font-smoothing: grayscale;
      }

      /* On Desktop, revert body background to Desk Color (#e8e4da) just in case */
      @media (min-width: 768px) {
        body {
            background-color: #e8e4da;
        }
      }

      /* Apply the "Title Font" to all Headings globally as a fallback */
      h1, h2, h3, h4, h5, h6 {
        font-family: 'ThinkPPT-Title', sans-serif;
      }
      
      /* Override .font-mono to use the "Small Font" instead of system monospace */
      .font-mono {
        font-family: 'ThinkPPT-Text', monospace !important;
        letter-spacing: 0.05em; /* Add slight tracking for a cleaner "small text" look */
      }
      
      /* Removed Custom Scrollbar Styles to use Default Browser Styles */
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "vite": "https://esm.sh/vite@^7.2.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    
    <!-- Debug Script for CORS: Check console if fonts fail -->
    <script>
      document.fonts.ready.then(function () {
        console.log('Fonts loaded state:', document.fonts.status);
      });
    </script>
  </body>
</html>
