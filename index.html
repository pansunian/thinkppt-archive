
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ThinkPPT | 深刻 PPT</title>
    
    <!-- 确保 preload 的 href 与下方 CSS 中的 url 完全一致，否则浏览器会报警告并可能导致加载失败 -->
    <link rel="preload" href="/jinghualaosongti.woff" as="font" type="font/woff" crossorigin="anonymous">
    <link rel="preload" href="/XiXianTingMingTi.woff2" as="font" type="font/woff2" crossorigin="anonymous">

    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                // 使用引号包裹字体名称以防止解析错误
                sans: ['"ThinkPPT-Text"', 'sans-serif'],
                mono: ['"ThinkPPT-Text"', 'monospace'],
                heading: ['"ThinkPPT-Title"', 'serif'], 
              }
            }
          }
        }
      }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      /* 
         修复：移除 URL 中的版本号参数 (?v=2)，使其与 preload 的 href 完全一致。
         这样浏览器才能正确匹配预加载的资源。
      */

      /* ThinkPPT-Title (Heading) - JingHuaLaoSongTi */
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('/jinghualaosongti.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('/jinghualaosongti.woff') format('woff');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('/jinghualaosongti.woff') format('woff');
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }

      /* ThinkPPT-Text (Body) - XiXianTingMingTi */
      @font-face {
        font-family: 'ThinkPPT-Text';
        src: url('/XiXianTingMingTi.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'ThinkPPT-Text';
        src: url('/XiXianTingMingTi.woff2') format('woff2');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      body {
        font-family: "ThinkPPT-Text", sans-serif;
        background-color: #d1cbc2;
        -webkit-font-smoothing: antialiased;
      }

      .paper-texture {
        position: relative;
      }
      .paper-texture::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.4;
        pointer-events: none;
        background-image: url("https://www.transparenttextures.com/patterns/p6-polyester.png");
        mix-blend-mode: multiply;
      }

      .ink-stamp {
        filter: url(#ink-bleed);
      }
      
      /* 强制覆盖 mono 字体 */
      .font-mono {
        font-family: "ThinkPPT-Text", monospace !important;
      }
    </style>

    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
      <filter id="paper-grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" />
        <feColorMatrix type="saturate" values="0" />
        <feBlend mode="multiply" in2="SourceGraphic" />
      </filter>
      <filter id="ink-bleed">
        <feGaussianBlur in="SourceGraphic" stdDeviation="0.4" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
    </svg>

  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "vite": "https://esm.sh/vite@^7.2.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
