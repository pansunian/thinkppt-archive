<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ThinkPPT | 深刻 PPT</title>
    
    <!-- 性能优化：提前连接外部域名 -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://images.unsplash.com">
    
    <!-- 0. PRELOAD FONTS: fetchpriority="high" 确保字体最先加载 -->
    <link rel="preload" href="/FZGaoYMCTJW-R.woff" as="font" type="font/woff" crossorigin="anonymous" fetchpriority="high">
    <link rel="preload" href="/SourceHanSansCN-Light.woff" as="font" type="font/woff" crossorigin="anonymous" fetchpriority="high">

    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ['ThinkPPT-Text', 'sans-serif'],
                mono: ['ThinkPPT-Text', 'monospace'],
                heading: ['ThinkPPT-Title', 'sans-serif'],
              }
            }
          }
        }
      }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('/FZGaoYMCTJW-R.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'ThinkPPT-Text';
        src: url('/SourceHanSansCN-Light.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      html { background-color: #ffffff; }
      body {
        font-family: 'ThinkPPT-Text', sans-serif;
        background-color: #ffffff;
        -webkit-font-smoothing: antialiased;
      }
      @media (min-width: 768px) { body { background-color: #e8e4da; } }
      h1, h2, h3, h4, h5, h6 { font-family: 'ThinkPPT-Title', sans-serif; }
      .font-mono { font-family: 'ThinkPPT-Text', monospace !important; letter-spacing: 0.05em; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "vite": "https://esm.sh/vite@^7.2.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
