<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThinkPPT | 深刻 PPT</title>
    
    <!-- 1. Configure Tailwind BEFORE loading the library -->
    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ['ThinkPPT-Text', 'sans-serif'],
                mono: ['ThinkPPT-Text', 'monospace'],
                heading: ['ThinkPPT-Title', 'sans-serif'],
              }
            }
          }
        }
      }
    </script>
    
    <!-- 2. Load Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      /* 1. Define Custom Title Font */
      @font-face {
        font-family: 'ThinkPPT-Title';
        src: url('https://panzhiming-notion.oss-cn-shanghai.aliyuncs.com/title.woff') format('woff');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      /* 2. Define Custom Body/Small Font */
      @font-face {
        font-family: 'ThinkPPT-Text';
        src: url('https://panzhiming-notion.oss-cn-shanghai.aliyuncs.com/text.woff2') format('woff2');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      body {
        /* Apply the "Small Font" (Text font) globally */
        font-family: 'ThinkPPT-Text', sans-serif;
        background-color: #f0f0f0;
        /* Dot grid pattern */
        background-image: radial-gradient(#ccc 1px, transparent 1px);
        background-size: 20px 20px;
      }

      /* Apply the "Title Font" to all Headings globally as a fallback */
      h1, h2, h3, h4, h5, h6 {
        font-family: 'ThinkPPT-Title', sans-serif;
      }
      
      /* Override .font-mono to use the "Small Font" instead of system monospace */
      .font-mono {
        font-family: 'ThinkPPT-Text', monospace !important;
        letter-spacing: 0.05em; /* Add slight tracking for a cleaner "small text" look */
      }

      /* Custom Scrollbar for the Archive feel */
      ::-webkit-scrollbar {
        width: 12px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-left: 2px solid black;
      }
      ::-webkit-scrollbar-thumb {
        background: #000;
        border: 2px solid #f1f1f1;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #333;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "vite": "https://esm.sh/vite@^7.2.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
