name: Deploy ThinkPPT to Aliyun OSS

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-thinkppt-aliyun-oss
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      NOTION_DB_AI_ID: ${{ secrets.NOTION_DB_AI_ID }}
      NOTION_PAGE_ABOUT_ID: ${{ secrets.NOTION_PAGE_ABOUT_ID }}
      NOTION_PAGE_SUBSCRIBE_ID: ${{ secrets.NOTION_PAGE_SUBSCRIBE_ID }}
      ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      ALIYUN_OSS_BUCKET: ${{ vars.ALIYUN_OSS_BUCKET || 'thinkppt' }}
      ALIYUN_OSS_ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT || 'oss-cn-shanghai.aliyuncs.com' }}
      STATIC_DATA_ENABLED: 'true'
      NOTION_MEDIA_MODE: all
      NOTION_MEDIA_DOWNLOAD_LIMIT: '40'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secrets
        shell: bash
        run: |
          required=(
            NOTION_API_KEY
            NOTION_DATABASE_ID
            ALIYUN_ACCESS_KEY_ID
            ALIYUN_ACCESS_KEY_SECRET
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is not set."
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore exported media cache
        uses: actions/cache@v4
        with:
          path: public/data/media
          key: thinkppt-media-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            thinkppt-media-${{ runner.os }}-

      - name: Export Notion and build static site
        run: npm run build:aliyun

      - name: Install ossutil
        shell: bash
        run: |
          curl -L -o ossutil.zip https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-linux-amd64.zip
          unzip -q ossutil.zip
          OSSUTIL_BIN="$(find . -type f \( -name 'ossutil64' -o -name 'ossutil' \) | head -n 1)"
          cp "$OSSUTIL_BIN" ./ossutil64
          chmod +x ossutil64
          ./ossutil64 config \
            -e "$ALIYUN_OSS_ENDPOINT" \
            -i "$ALIYUN_ACCESS_KEY_ID" \
            -k "$ALIYUN_ACCESS_KEY_SECRET" \
            -L CH

      - name: Upload dist to Aliyun OSS
        shell: bash
        run: |
          OSSUTIL_BIN=./ossutil64 node scripts/deploy-aliyun-oss.mjs
          node scripts/set-oss-index-meta.mjs

      - name: Write deployment summary
        run: |
          {
            echo "### ThinkPPT deployed to Aliyun OSS"
            echo ""
            echo "- Bucket: \`$ALIYUN_OSS_BUCKET\`"
            echo "- Endpoint: \`$ALIYUN_OSS_ENDPOINT\`"
            echo "- Static data: exported from Notion"
          } >> "$GITHUB_STEP_SUMMARY"
