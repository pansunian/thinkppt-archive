<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThinkPPT Design Demo 01 · IP Map Index</title>
  <!--
    Huashu-Design assumptions:
    - 目标不是“资源站列表”，而是让营销从业者一眼理解：这里按平台和 IP 长期追踪招商方案。
    - 第一版采用“地图式索引”：顶部平台切换，左侧 IP 目录，主区 IP 卡片，右侧固定详情。
    - 用户点击后的反馈必须发生在当前视口，不把详情藏到页面底部。
    - 图片使用已有 PDF 转出的真实 16:9 页图；其它 IP 先用诚实文本占位。
  -->
  <style>
    :root {
      --paper: #f3efe5;
      --sheet: #fffaf0;
      --ink: #14120f;
      --muted: #756f66;
      --line: rgba(20, 18, 15, .14);
      --accent: #9b392d;
      --accent-2: #2f6f65;
      --dark: #151412;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: "Inter", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      --serif: Georgia, "Times New Roman", "Songti SC", serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      letter-spacing: 0;
    }
    button { font: inherit; color: inherit; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 260px 1fr auto;
      gap: 28px;
      align-items: center;
      padding: 18px 34px;
      background: rgba(243, 239, 229, .92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      background: var(--ink);
      color: var(--paper);
      font: 700 26px var(--serif);
    }
    .brand small {
      display: block;
      font: 700 10px var(--mono);
      letter-spacing: .32em;
      color: var(--muted);
    }
    .brand strong {
      display: block;
      margin-top: 3px;
      font-size: 18px;
      line-height: 1.1;
    }
    .platforms {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .platforms button,
    .ghost-button {
      border: 1px solid var(--line);
      background: transparent;
      padding: 10px 16px;
      cursor: pointer;
      font: 800 11px var(--mono);
      letter-spacing: .14em;
      white-space: nowrap;
      transition: .18s ease;
    }
    .platforms button.active,
    .platforms button:hover,
    .ghost-button:hover {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--paper);
    }
    .layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 420px;
      min-height: 0;
    }
    .rail {
      border-right: 1px solid var(--line);
      padding: 32px 24px;
    }
    .rail h1 {
      margin: 0 0 20px;
      font: 700 clamp(42px, 4.5vw, 74px) / .9 var(--serif);
      letter-spacing: -0.03em;
    }
    .rail p {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--line);
      border-left: 1px solid var(--line);
      margin-bottom: 28px;
    }
    .metric {
      min-height: 94px;
      padding: 14px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .metric b { display: block; font-size: 32px; line-height: 1; }
    .metric span { display: block; margin-top: 10px; font: 700 10px var(--mono); letter-spacing: .18em; color: var(--muted); }
    .ip-list {
      display: grid;
      gap: 8px;
    }
    .ip-list button {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      width: 100%;
      border: 1px solid transparent;
      border-top-color: var(--line);
      background: transparent;
      padding: 13px 4px;
      text-align: left;
      cursor: pointer;
    }
    .ip-list button.active {
      color: var(--accent);
      border-top-color: var(--accent);
    }
    .ip-list b { font-size: 16px; }
    .ip-list span { font: 700 10px var(--mono); letter-spacing: .12em; color: var(--muted); }
    .main {
      padding: 32px;
      overflow: auto;
    }
    .section-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
      color: var(--muted);
      font: 700 10px var(--mono);
      letter-spacing: .24em;
      text-transform: uppercase;
    }
    .section-label::after {
      content: "";
      height: 1px;
      flex: 1;
      background: var(--line);
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    .ip-card {
      border: 1px solid var(--line);
      background: var(--sheet);
      min-height: 360px;
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      cursor: pointer;
      text-align: left;
      transition: .2s ease;
    }
    .ip-card:hover,
    .ip-card.active {
      border-color: var(--accent);
      box-shadow: 0 16px 40px rgba(20, 18, 15, .08);
      transform: translateY(-2px);
    }
    .thumb {
      aspect-ratio: 16/9;
      background: #fff;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .card-title {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
    }
    .card-title h2 {
      margin: 0;
      font-size: clamp(34px, 4vw, 58px);
      line-height: .92;
      letter-spacing: -0.06em;
    }
    .card-title .count {
      text-align: right;
      font: 700 11px var(--mono);
      color: var(--muted);
      line-height: 1.7;
    }
    .ip-card p {
      margin: 18px 0 0;
      max-width: 36em;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }
    .tags span {
      border: 1px solid var(--line);
      padding: 8px 10px;
      font: 700 10px var(--mono);
      letter-spacing: .12em;
      color: var(--muted);
    }
    .detail {
      border-left: 1px solid var(--line);
      background: var(--dark);
      color: var(--paper);
      min-height: calc(100vh - 79px);
      position: sticky;
      top: 79px;
      align-self: start;
      padding: 28px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 22px;
    }
    .detail small {
      font: 700 10px var(--mono);
      letter-spacing: .28em;
      color: rgba(243, 239, 229, .42);
      text-transform: uppercase;
    }
    .detail h2 {
      margin: 12px 0 0;
      font: 700 54px / .94 var(--serif);
      letter-spacing: -0.04em;
    }
    .version-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .version-tabs button,
    .page-tabs button {
      border: 1px solid rgba(243, 239, 229, .2);
      color: rgba(243, 239, 229, .72);
      background: transparent;
      padding: 10px 12px;
      cursor: pointer;
      font: 700 10px var(--mono);
      letter-spacing: .12em;
    }
    .version-tabs button.active,
    .page-tabs button.active {
      background: var(--paper);
      color: var(--ink);
      border-color: var(--paper);
    }
    .viewer {
      min-width: 0;
    }
    .viewer .thumb {
      border-color: rgba(243, 239, 229, .18);
      background: #0b0b0b;
    }
    .viewer h3 {
      margin: 18px 0 0;
      font-size: 20px;
      line-height: 1.35;
    }
    .viewer p {
      color: rgba(243, 239, 229, .62);
      font-size: 13px;
      line-height: 1.8;
      margin: 10px 0 0;
    }
    .page-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .page-tabs button { min-width: 0; padding: 10px 4px; }
    .placeholder-frame {
      width: 100%;
      height: 100%;
      padding: 18px;
      display: grid;
      align-content: space-between;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        #fffaf0;
      background-size: 44px 44px;
      color: var(--ink);
    }
    .placeholder-frame b { font: 700 42px/.9 var(--serif); letter-spacing: -0.04em; }
    .placeholder-frame span { font: 700 10px var(--mono); letter-spacing: .18em; color: var(--accent); }

    @media (max-width: 1180px) {
      .layout { grid-template-columns: 240px 1fr; }
      .detail { position: relative; top: 0; grid-column: 1 / -1; min-height: auto; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      .topbar { grid-template-columns: 1fr; padding: 16px; }
      .layout { display: block; }
      .rail, .main, .detail { padding: 22px 16px; }
      .rail { border-right: 0; border-bottom: 1px solid var(--line); }
      .cards { grid-template-columns: 1fr; }
      .detail h2 { font-size: 42px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">T</div>
        <div>
          <small>THINKPPT</small>
          <strong>Platform IP Annual</strong>
        </div>
      </div>
      <nav class="platforms" id="platforms"></nav>
      <button class="ghost-button" id="openSelected">打开当前 IP</button>
    </header>

    <main class="layout">
      <aside class="rail">
        <h1>IP Map<br>Index</h1>
        <p>把平台招商方案从“文件堆”改造成“IP 地图”：先选平台，再看 IP，再进入某一年的 PDF 精选页。</p>
        <div class="metric-grid">
          <div class="metric"><b id="platformMetric">4</b><span>PLATFORM</span></div>
          <div class="metric"><b id="ipMetric">8</b><span>IP UNITS</span></div>
          <div class="metric"><b id="planMetric">12</b><span>SCHEMES</span></div>
          <div class="metric"><b>16:9</b><span>PDF FRAME</span></div>
        </div>
        <div class="ip-list" id="ipList"></div>
      </aside>

      <section class="main">
        <div class="section-label"><span id="currentLabel">全部平台</span></div>
        <div class="cards" id="cards"></div>
      </section>

      <aside class="detail" id="detail"></aside>
    </main>
  </div>

  <script>
    const imageBase = "/scheme-pages/xiaohongshu/manrenjie";
    const archives = [
      {
        platform: "小红书",
        name: "慢人节",
        years: "2024-2025",
        type: "生活方式情绪 IP",
        thesis: "围绕慢生活、城市散步、情绪疗愈与线下体验，观察小红书如何把生活态度包装成可招商的长期 IP。",
        versions: [
          { year: "2024", title: "2024小红书慢人节招商通案", dir: `${imageBase}/2024-tongan`, pages: ["001", "003", "012", "033"], labels: ["封面", "慢人心态", "平台级事件", "慢人路线"] },
          { year: "2024 2.0", title: "小红书2024慢人节2.0营销方案", dir: `${imageBase}/2024-2`, pages: ["001", "005", "008", "023"], labels: ["封面", "慢人群趋势", "核心洞察", "长线运营"] },
          { year: "2025", title: "小红书慢人节2025年长线IP规划", dir: `${imageBase}/2025-planning`, pages: ["001", "003", "021", "028"], labels: ["封面", "年度规划", "内容阵地", "用户旅程"] }
        ]
      },
      { platform: "小红书", name: "遛遛生活", years: "2025", type: "城市市集 IP", thesis: "把城市散步、社区市集、线下摊位与品牌共创组合成可参与的生活方式场景。", versions: [] },
      { platform: "小红书", name: "闪光青春派", years: "2025", type: "校园开学季 IP", thesis: "面向大学生开学节点，把内容共创、校园场景和品牌曝光整合成年度校园营销资产。", versions: [] },
      { platform: "小红书", name: "外人节", years: "2024", type: "户外生活方式 IP", thesis: "以走到户外、成为外人为核心主张，持续追踪小红书户外生活方式 IP 的招商演进。", versions: [] },
      { platform: "抖音", name: "节气 IP", years: "2025", type: "传统文化节点 IP", thesis: "用二十四节气作为全年内容日历，把传统文化、达人内容和品牌种草连成长期资产。", versions: [] },
      { platform: "快手", name: "春节 IP", years: "2026", type: "春节节点 IP", thesis: "围绕 CNY、晚会、互动和站内资源，观察快手如何把春节流量转化为平台招商权益。", versions: [] },
      { platform: "BILIBILI", name: "拜年纪", years: "2025-2026", type: "春节内容 IP", thesis: "B站代表性春节内容资产，适合观察社区内容、UP主生态与品牌节点合作方式。", versions: [] },
      { platform: "BILIBILI", name: "百大UP主盛典", years: "2024", type: "创作者盛典 IP", thesis: "围绕头部 UP 主和社区荣誉体系，展示 B站如何把创作者生态包装为品牌赞助场景。", versions: [] }
    ];

    let activePlatform = "全部";
    let selectedIndex = 0;
    let selectedVersion = 0;
    let selectedPage = 0;

    const platforms = ["全部", ...Array.from(new Set(archives.map(item => item.platform)))];
    const $ = selector => document.querySelector(selector);

    function getFiltered() {
      return archives.filter(item => activePlatform === "全部" || item.platform === activePlatform);
    }

    function getCover(archive) {
      const version = archive.versions[0];
      if (!version) return "";
      return `${version.dir}/page-${version.pages[0]}.webp`;
    }

    function renderPlatformNav() {
      $("#platforms").innerHTML = platforms.map(platform => `
        <button class="${platform === activePlatform ? "active" : ""}" data-platform="${platform}">${platform}</button>
      `).join("");
      document.querySelectorAll("[data-platform]").forEach(btn => {
        btn.onclick = () => {
          activePlatform = btn.dataset.platform;
          selectedIndex = 0;
          selectedVersion = 0;
          selectedPage = 0;
          render();
        };
      });
    }

    function renderRail() {
      const filtered = getFiltered();
      $("#platformMetric").textContent = platforms.length - 1;
      $("#ipMetric").textContent = filtered.length;
      $("#planMetric").textContent = filtered.reduce((sum, item) => sum + Math.max(item.versions.length, 1), 0);
      $("#ipList").innerHTML = filtered.map((item, index) => `
        <button class="${index === selectedIndex ? "active" : ""}" data-index="${index}">
          <b>${item.name}</b>
          <span>${item.versions.length || 1} 份</span>
        </button>
      `).join("");
      document.querySelectorAll("[data-index]").forEach(btn => {
        btn.onclick = () => {
          selectedIndex = Number(btn.dataset.index);
          selectedVersion = 0;
          selectedPage = 0;
          render();
        };
      });
    }

    function renderCards() {
      const filtered = getFiltered();
      $("#currentLabel").textContent = activePlatform === "全部" ? "全部平台" : `${activePlatform} 平台`;
      $("#cards").innerHTML = filtered.map((item, index) => {
        const cover = getCover(item);
        return `
          <button class="ip-card ${index === selectedIndex ? "active" : ""}" data-card="${index}">
            <div class="thumb">${cover ? `<img src="${cover}" alt="${item.name}">` : `<div class="placeholder-frame"><span>${item.platform}</span><b>${item.name}</b><span>${item.years}</span></div>`}</div>
            <div>
              <div class="card-title">
                <h2>${item.name}</h2>
                <div class="count">${item.years}<br>${item.versions.length || 1} 份档案</div>
              </div>
              <p>${item.thesis}</p>
            </div>
            <div class="tags"><span>${item.platform}</span><span>${item.type}</span><span>${item.years}</span></div>
          </button>
        `;
      }).join("");
      document.querySelectorAll("[data-card]").forEach(btn => {
        btn.onclick = () => {
          selectedIndex = Number(btn.dataset.card);
          selectedVersion = 0;
          selectedPage = 0;
          render();
        };
      });
    }

    function renderDetail() {
      const archive = getFiltered()[selectedIndex] || getFiltered()[0] || archives[0];
      const versions = archive.versions.length ? archive.versions : [{ year: archive.years, title: `${archive.name} 方案待整理`, dir: "", pages: [], labels: ["封面", "洞察", "主题", "脉络"] }];
      const version = versions[selectedVersion] || versions[0];
      const pages = version.pages.length ? version.pages : ["", "", "", ""];
      const labels = version.labels || ["封面", "洞察", "主题", "脉络"];
      const pageNo = pages[selectedPage] || pages[0];
      const image = version.dir && pageNo ? `${version.dir}/page-${pageNo}.webp` : "";
      $("#detail").innerHTML = `
        <div>
          <small>Selected Archive</small>
          <h2>${archive.name}</h2>
        </div>
        <div class="version-tabs">
          ${versions.map((item, index) => `<button class="${index === selectedVersion ? "active" : ""}" data-version="${index}">${item.year}</button>`).join("")}
        </div>
        <div class="viewer">
          <div class="thumb">${image ? `<img src="${image}" alt="${labels[selectedPage]}">` : `<div class="placeholder-frame"><span>${archive.platform}</span><b>${archive.name}</b><span>PDF 待转图</span></div>`}</div>
          <h3>${version.title}</h3>
          <p>${archive.thesis}</p>
        </div>
        <div class="page-tabs">
          ${labels.map((label, index) => `<button class="${index === selectedPage ? "active" : ""}" data-page="${index}">${label}</button>`).join("")}
        </div>
      `;
      document.querySelectorAll("[data-version]").forEach(btn => {
        btn.onclick = () => {
          selectedVersion = Number(btn.dataset.version);
          selectedPage = 0;
          renderDetail();
        };
      });
      document.querySelectorAll("[data-page]").forEach(btn => {
        btn.onclick = () => {
          selectedPage = Number(btn.dataset.page);
          renderDetail();
        };
      });
    }

    function render() {
      const filtered = getFiltered();
      if (selectedIndex >= filtered.length) selectedIndex = 0;
      renderPlatformNav();
      renderRail();
      renderCards();
      renderDetail();
    }

    $("#openSelected").onclick = () => {
      const detailTop = document.querySelector(".detail").getBoundingClientRect().top + window.pageYOffset - 80;
      window.scrollTo({ top: detailTop, behavior: "smooth" });
    };

    render();
  </script>
</body>
</html>
