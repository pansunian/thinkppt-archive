<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThinkPPT Design Demo 04 · PPT Annual</title>
  <style>
    :root {
      --paper:#eee8dc; --sheet:#fffaf0; --ink:#11100d; --muted:#746d63;
      --line:rgba(17,16,13,.14); --red:#96342a; --dark:#151412;
      --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      --sans:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
      --serif:Georgia,"Songti SC",serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans)}
    button{font:inherit;color:inherit}
    .page{min-height:100vh;padding:28px}
    .book{min-height:calc(100vh - 56px);border:1px solid var(--line);background:var(--sheet);display:grid;grid-template-columns:1.05fr 1.25fr .78fr}
    .cover{padding:38px;border-right:1px solid var(--line);display:grid;grid-template-rows:auto 1fr auto;gap:28px}
    .brand{display:flex;gap:14px;align-items:center}
    .mark{width:48px;height:48px;background:var(--ink);color:var(--sheet);display:grid;place-items:center;font:700 30px var(--serif)}
    .brand small,.kicker,.meta,.index small,.viewer small{font:800 10px var(--mono);letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}
    .brand b{display:block;margin-top:4px;font-size:18px}
    .cover h1{margin:0;font:700 clamp(54px,7vw,112px)/.84 var(--serif);letter-spacing:-.07em}
    .cover p{margin:22px 0 0;max-width:520px;color:var(--muted);font-size:15px;line-height:1.9}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line);border-left:1px solid var(--line)}
    .stat{padding:16px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
    .stat b{display:block;font-size:34px;line-height:1}
    .stat span{display:block;margin-top:10px;font:800 10px var(--mono);letter-spacing:.16em;color:var(--muted)}
    .catalog{padding:34px;border-right:1px solid var(--line);display:grid;grid-template-rows:auto auto 1fr;gap:24px}
    .platforms{display:flex;gap:8px;flex-wrap:wrap}
    .platforms button,.ip-row,.version button{border:1px solid var(--line);background:transparent;cursor:pointer;transition:.18s ease}
    .platforms button{padding:10px 14px;font:800 10px var(--mono);letter-spacing:.16em}
    .platforms button.active,.platforms button:hover,.version button.active{background:var(--ink);color:var(--sheet);border-color:var(--ink)}
    .index{display:grid;gap:0;border-top:1px solid var(--line)}
    .ip-row{border-width:0 0 1px 0;padding:20px 0;text-align:left;display:grid;grid-template-columns:64px 1fr auto;gap:18px;align-items:start}
    .ip-row.active{color:var(--red)}
    .ip-row em{font-style:normal;font:800 11px var(--mono);letter-spacing:.16em;color:var(--red)}
    .ip-row h2{margin:0;font:700 38px/.9 var(--serif);letter-spacing:-.05em}
    .ip-row p{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.7;max-width:520px}
    .ip-row .count{text-align:right;font:800 10px/1.7 var(--mono);letter-spacing:.14em;color:var(--muted)}
    .viewer{padding:24px;background:var(--dark);color:var(--sheet);display:grid;grid-template-rows:auto auto 1fr auto;gap:18px}
    .viewer h2{margin:8px 0 0;font:700 48px/.92 var(--serif);letter-spacing:-.06em}
    .viewer p{margin:10px 0 0;color:rgba(255,250,240,.62);font-size:13px;line-height:1.8}
    .version{display:flex;gap:8px;overflow:auto}
    .version button{min-width:112px;padding:10px;color:rgba(255,250,240,.72);border-color:rgba(255,250,240,.2);font:800 10px var(--mono);letter-spacing:.12em}
    .version button.active{background:var(--sheet);color:var(--dark);border-color:var(--sheet)}
    .frame{min-height:0;border:1px solid rgba(255,250,240,.16);padding:14px;display:grid;align-content:center}
    .frame img{width:100%;aspect-ratio:16/9;object-fit:contain;background:#fff;border:14px solid #0a0a09}
    .pages{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .pages button{border:1px solid rgba(255,250,240,.2);background:transparent;color:rgba(255,250,240,.72);padding:10px 4px;cursor:pointer;font:800 10px var(--mono);letter-spacing:.12em}
    .pages button.active,.pages button:hover{background:var(--sheet);color:var(--dark)}
    @media(max-width:1200px){.book{grid-template-columns:1fr}.cover,.catalog{border-right:0;border-bottom:1px solid var(--line)}}
  </style>
</head>
<body>
<main class="page">
  <section class="book">
    <aside class="cover">
      <div class="brand"><div class="mark">T</div><div><small>THINKPPT</small><b>PPT Marketing Annual</b></div></div>
      <div>
        <div class="kicker">Platform IP Scheme Archive</div>
        <h1>PPT 年鉴</h1>
        <p>不是方案下载站，而是一本文向策划人与品牌市场部的数字年鉴：按平台、IP、年份和代表页追踪营销方案的表达方式。</p>
      </div>
      <div class="stats">
        <div class="stat"><b>4</b><span>PLATFORM</span></div>
        <div class="stat"><b>7</b><span>IP INDEX</span></div>
        <div class="stat"><b>12</b><span>PAGES</span></div>
      </div>
    </aside>
    <section class="catalog">
      <div>
        <div class="kicker">Annual Index</div>
        <h2 style="margin:10px 0 0;font-size:28px;letter-spacing:-.04em">先看 IP，再看这个 IP 的年度方案。</h2>
      </div>
      <nav class="platforms" id="platforms"></nav>
      <div class="index" id="index"></div>
    </section>
    <aside class="viewer">
      <div><small>Selected Archive</small><h2 id="title"></h2><p id="thesis"></p></div>
      <div class="version" id="versions"></div>
      <div class="frame"><img id="image" alt="PDF page"></div>
      <div class="pages" id="pages"></div>
    </aside>
  </section>
</main>
<script>
const root="/scheme-pages/xiaohongshu/manrenjie";
const data=[
{platform:"小红书",name:"慢人节",type:"生活方式情绪 IP",thesis:"同一 IP 跨年度招商与长线规划，适合观察平台如何把情绪趋势转成品牌资源。",versions:[
{year:"2024",title:"2024小红书慢人节招商通案",dir:`${root}/2024-tongan`,pages:["001","003","012","033"],labels:["封面","洞察","事件","路线"]},
{year:"2024 2.0",title:"小红书2024慢人节2.0营销方案",dir:`${root}/2024-2`,pages:["001","005","008","023"],labels:["封面","人群","洞察","运营"]},
{year:"2025",title:"小红书慢人节2025年长线IP规划",dir:`${root}/2025-planning`,pages:["001","003","021","028"],labels:["封面","规划","阵地","旅程"]}]},
{platform:"小红书",name:"遛遛生活",type:"城市市集 IP",thesis:"城市散步、市集和线下体验如何变成平台招商项目。",versions:[]},
{platform:"小红书",name:"闪光青春派",type:"校园 IP",thesis:"校园开学季如何被包装成年度营销资产。",versions:[]},
{platform:"抖音",name:"节气 IP",type:"传统文化 IP",thesis:"节气日历、达人内容和品牌种草的长期结构。",versions:[]},
{platform:"快手",name:"春节 IP",type:"春节节点 IP",thesis:"春节流量如何变成晚会、互动和品牌资源包。",versions:[]},
{platform:"BILIBILI",name:"拜年纪",type:"内容 IP",thesis:"社区内容、UP主生态与春节节点合作方式。",versions:[]}
];
let platform="全部",ip=0,version=0,page=0;
const $=s=>document.querySelector(s);
const platforms=["全部",...new Set(data.map(d=>d.platform))];
const filtered=()=>data.filter(d=>platform==="全部"||d.platform===platform);
const current=()=>filtered()[ip]||filtered()[0]||data[0];
const versions=()=>current().versions.length?current().versions:[{year:current().platform,title:`${current().name} PDF 待接入`,dir:"",pages:["","","",""],labels:["封面","洞察","主题","脉络"]}];
function img(v,p){return v.dir&&v.pages[p]?`${v.dir}/page-${v.pages[p]}.webp`:"";}
function render(){
 if(ip>=filtered().length)ip=0;
 $("#platforms").innerHTML=platforms.map(p=>`<button class="${p===platform?"active":""}" data-p="${p}">${p}</button>`).join("");
 document.querySelectorAll("[data-p]").forEach(b=>b.onclick=()=>{platform=b.dataset.p;ip=0;version=0;page=0;render()});
 $("#index").innerHTML=filtered().map((d,i)=>`<button class="ip-row ${i===ip?"active":""}" data-i="${i}"><em>${String(i+1).padStart(2,"0")}</em><div><h2>${d.name}</h2><p>${d.thesis}</p></div><div class="count">${d.platform}<br>${d.versions.length||1} 份</div></button>`).join("");
 document.querySelectorAll("[data-i]").forEach(b=>b.onclick=()=>{ip=Number(b.dataset.i);version=0;page=0;render()});
 const a=current(), vs=versions(), v=vs[version]||vs[0];
 $("#title").textContent=a.name; $("#thesis").textContent=a.thesis;
 $("#versions").innerHTML=vs.map((x,i)=>`<button class="${i===version?"active":""}" data-v="${i}">${x.year}</button>`).join("");
 document.querySelectorAll("[data-v]").forEach(b=>b.onclick=()=>{version=Number(b.dataset.v);page=0;render()});
 $("#pages").innerHTML=v.labels.map((x,i)=>`<button class="${i===page?"active":""}" data-page="${i}">${x}</button>`).join("");
 document.querySelectorAll("[data-page]").forEach(b=>b.onclick=()=>{page=Number(b.dataset.page);render()});
 const src=img(v,page);
 $("#image").style.display=src?"block":"none"; if(src)$("#image").src=src;
}
render();
</script>
</body>
</html>
